<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI CCTV — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #07090f;
    --panel:   #0d1117;
    --border:  #1c2a3a;
    --accent:  #00e5ff;
    --accent2: #ff2d55;
    --text:    #c8d6e5;
    --muted:   #4a5568;
    --success: #00ff88;
  }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  /* Scanning line */
  body::after {
    content: '';
    position: fixed;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scan 4s linear infinite;
    opacity: 0.4;
  }

  @keyframes scan {
    0%   { top: -2px; }
    100% { top: 100vh; }
  }

  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .brand {
    text-align: center;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 64px;
    height: 64px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: pulse-ring 2s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(0,229,255,0); }
  }

  .brand-icon svg { width: 32px; height: 32px; fill: var(--accent); }

  .brand h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .brand p {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    font-family: 'Share Tech Mono', monospace;
    margin-top: 4px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 36px 32px;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    font-family: 'Share Tech Mono', monospace;
  }

  .field input {
    width: 100%;
    background: #0a0f1a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-size: 15px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 500;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  .error-msg {
    background: rgba(255,45,85,0.1);
    border: 1px solid rgba(255,45,85,0.3);
    color: var(--accent2);
    padding: 10px 14px;
    font-size: 13px;
    border-radius: 2px;
    margin-bottom: 20px;
    font-family: 'Share Tech Mono', monospace;
  }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-family: 'Rajdhani', sans-serif;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-login:hover  { background: #33eeff; }
  .btn-login:active { transform: scale(0.98); }

  .hint {
    text-align: center;
    margin-top: 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
      </svg>
    </div>
    <h1>AI CCTV</h1>
    <p>SURVEILLANCE SYSTEM</p>
  </div>

  <div class="card">
    {% if error %}
    <div class="error-msg">⚠ {{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter username" autocomplete="off" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login">ACCESS SYSTEM</button>
    </form>
  </div>

  <div class="hint">DEFAULT: admin / admin123</div>
</div>
</body>
</html>
